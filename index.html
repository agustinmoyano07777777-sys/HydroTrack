<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HydroTrack</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3105/3105807.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f9ff; -webkit-tap-highlight-color: transparent; }
        .progress-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .dot-pattern { background-image: radial-gradient(rgba(255,255,255,0.2) 1px, transparent 1px); background-size: 15px 15px; }
        .bottle-card { transition: all 0.2s ease; }
        .bottle-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 flex justify-center items-start min-h-screen">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-sky-100">
        <div class="bg-gradient-to-br from-sky-400 to-blue-600 p-8 text-white text-center relative dot-pattern">
            <div class="flex justify-center items-center gap-2 mb-1">
                <span class="text-2xl">💧</span>
                <h1 class="text-3xl font-black tracking-tight">HydroTrack</h1>
            </div>
            <p class="text-sky-100 text-xs font-medium">Tu meta diaria de hidratación</p>
            <button class="absolute top-6 right-6 text-white/80">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </div>

        <div class="p-6 space-y-4">
            <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🍶</span>
                    <div>
                        <p class="text-sm font-bold text-slate-700">Tamaño de Botella</p>
                        <p class="text-xs text-slate-500" id="bottleSizeLabel">500 ml</p>
                    </div>
                </div>
                <button onclick="changeBottleSize()" class="text-sky-500 text-sm font-bold">✎ Cambiar</button>
            </div>

            <div class="bg-green-50 border border-green-100 p-4 rounded-2xl flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-xl">✅</span>
                    <div>
                        <p class="text-sm font-bold text-green-800">Notificaciones Activas</p>
                        <p class="text-xs text-green-600">Próxima en: <span id="countdown">--:--:--</span></p>
                    </div>
                </div>
                <button onclick="testNotification()" class="text-sky-500 text-xs font-bold">🪄 Probar</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-sky-50 p-4 rounded-2xl border border-sky-100 text-center">
                    <p class="text-[10px] uppercase font-bold text-sky-400">Meta Total</p>
                    <p class="text-xl font-black text-slate-700"><span id="metaCount">6</span> <span class="text-xs font-normal text-slate-400">botellas</span></p>
                    <p class="text-[10px] text-sky-500 font-bold"><span id="metaMlDisplay">3000</span> ml</p>
                </div>
                <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 text-center">
                    <p class="text-[10px] uppercase font-bold text-orange-400">⏰ Próxima</p>
                    <p class="text-xl font-black text-slate-700" id="nextHour">18:46</p>
                    <p class="text-[10px] text-orange-500 font-bold">hora sugerida</p>
                </div>
            </div>

            <div class="px-1">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[10px] font-black text-sky-500 uppercase">Progreso</span>
                    <span class="text-xs font-black text-sky-500" id="progressPercent">0%</span>
                </div>
                <div class="h-3 w-full bg-sky-100 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-sky-500 progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <div id="bottleContainer" class="space-y-3 pt-2">
                </div>
            
            <button onclick="resetDay()" class="w-full py-4 text-slate-400 text-xs font-bold hover:text-slate-600 transition-colors">
                Reiniciar día
            </button>
        </div>
    </div>

    <script>
let state = {
            weight: 75,
            bottleSize: 500,
            consumed: 0,
            meta: 0,
            nextReminder: null
        };

        function init() {
            loadData();
            setNextReminder(); // Calcula la primera notificación
            setInterval(updateCountdown, 1000); // Actualiza el segundero cada segundo
        }

        function setNextReminder() {
            const now = new Date();
            // Programamos la siguiente para dentro de 2 horas (o lo que prefieras)
            state.nextReminder = new Date(now.getTime() + 2 * 60 * 60 * 1000); 
            
            // Actualizamos la tarjeta de "PRÓXIMA" con formato HH:MM
            const hours = state.nextReminder.getHours().toString().padStart(2, '0');
            const minutes = state.nextReminder.getMinutes().toString().padStart(2, '0');
            document.getElementById('nextHour').innerText = `${hours}:${minutes}`;
        }

        function updateCountdown() {
            if (!state.nextReminder) return;

            const now = new Date();
            const diff = state.nextReminder - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerText = "¡Es hora de beber! 💧";
                // Aquí podrías disparar la notificación real si tienes permiso
                return;
            }

            // Calculamos horas, minutos y segundos restantes
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Modificamos la función de marcar botella para que reinicie el temporizador
        function toggleBottle(index) {
            state.consumed = index;
            setNextReminder(); // Al beber una, la siguiente se pospone 2 horas
            updateUI();
        }
        // Reloj de ejemplo
        setInterval(() => {
            const now = new Date();
            document.getElementById('countdown').innerText = now.toLocaleTimeString();
        }, 1000);

        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Inicio
        loadData();
    </script>
</body>
</html>
