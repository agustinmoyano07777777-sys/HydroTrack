<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HydroTrack - Control de Hidratación</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#38bdf8">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3105/3105807.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f9ff; -webkit-tap-highlight-color: transparent; }
        .progress-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: white; border-radius: 1rem; padding: 1.5rem; width: 90%; max-width: 400px; transform: scale(0.9); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center py-8 px-4">

    <main class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-sky-100">
        <div class="bg-gradient-to-r from-sky-400 to-blue-500 p-6 text-white text-center relative overflow-hidden">
            <h1 class="text-2xl font-bold relative z-10">💧 HydroTrack</h1>
            <p class="text-sky-100 text-sm relative z-10">Tu meta diaria de hidratación</p>
            <button onclick="openSettingsModal()" class="absolute top-4 right-4 text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </div>

        <div class="p-6 space-y-6">
            <div id="setupSection" class="space-y-4">
                <div class="bg-sky-50 p-4 rounded-xl border border-sky-100">
                    <label class="block text-sm font-semibold text-slate-600 mb-2">¿Cuánto pesas? (kg)</label>
                    <div class="flex gap-2">
                        <input type="number" id="weightInput" value="75" class="w-full px-4 py-3 rounded-lg border border-slate-200 text-lg font-bold">
                        <button onclick="calculateGoal()" class="bg-sky-500 text-white px-6 py-3 rounded-lg font-semibold">Calcular</button>
                    </div>
                </div>
            </div>

            <div id="dashboardSection" class="hidden space-y-6">
                <div id="notificationStatus" class="bg-green-50 border border-green-200 rounded-xl p-4 hidden">
                    <div class="flex items-center justify-between">
                        <p class="text-sm font-semibold text-green-800">Alerta activa: <span id="countdownTimer">--:--</span></p>
                        <button onclick="testNotification()" class="text-sky-500 text-xs font-bold">🧪 Probar</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 text-center">
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-xs text-slate-500 uppercase font-bold">Meta</p>
                        <p class="text-xl font-bold"><span id="targetBottlesDisplay">0</span> botellas</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100" id="nextTimeCard">
                        <p class="text-xs text-slate-500 uppercase font-bold">Próxima</p>
                        <p class="text-xl font-bold" id="nextTimeDisplay">--:--</p>
                    </div>
                </div>

                <div class="relative pt-1">
                    <div class="overflow-hidden h-4 mb-4 flex rounded-full bg-sky-100">
                        <div id="progressBar" style="width:0%" class="bg-sky-500 progress-fill"></div>
                    </div>
                </div>

                <div id="bottleList" class="space-y-3"></div>

                <button onclick="resetDay()" class="w-full py-3 text-xs text-slate-400">Reiniciar día</button>
            </div>
        </div>
    </main>

    <script>
        let appState = { weight: 75, targetBottles: 0, consumedBottles: 0, bottleSize: 500, notificationsEnabled: true, nextNotificationTime: null };

        // Registro del Service Worker para iPhone
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function calculateGoal() {
            const w = document.getElementById('weightInput').value;
            if (w > 0) {
                appState.weight = w;
                appState.targetBottles = Math.ceil((w / 7 * 250) / appState.bottleSize);
                document.getElementById('setupSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                renderDashboard();
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }
        }

        function renderDashboard() {
            document.getElementById('targetBottlesDisplay').textContent = appState.targetBottles;
            const list = document.getElementById('bottleList');
            list.innerHTML = '';
            for (let i = 1; i <= appState.targetBottles; i++) {
                const checked = i <= appState.consumedBottles;
                list.innerHTML += `
                    <div onclick="toggleBottle(${i})" class="flex items-center justify-between p-4 bg-white border rounded-xl cursor-pointer ${checked ? 'opacity-50' : ''}">
                        <span class="font-bold">Botella #${i}</span>
                        <span>${checked ? '✅' : '💧'}</span>
                    </div>`;
            }
            const progress = (appState.consumedBottles / appState.targetBottles) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function toggleBottle(n) {
            appState.consumedBottles = n;
            renderDashboard();
        }

        function testNotification() {
            if (Notification.permission === 'granted') {
                new Notification('HydroTrack 💧', { body: '¡Funciona! Bebe un poco de agua.' });
            } else {
                alert('Permite las notificaciones en ajustes.');
            }
        }

        function resetDay() {
            appState.consumedBottles = 0;
            renderDashboard();
        }
    </script>
</body>
</html>
