<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HydroTrack</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3105/3105807.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f9ff; -webkit-tap-highlight-color: transparent; }
        .progress-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottle-card { transition: all 0.2s ease; }
        .bottle-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 flex justify-center items-start min-h-screen">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-sky-100">
        <div class="bg-gradient-to-br from-sky-400 to-blue-600 p-8 text-white text-center">
            <h1 class="text-3xl font-black tracking-tight">💧 HydroTrack</h1>
            <p class="text-sky-100 text-xs font-medium">Tu meta diaria de hidratación</p>
        </div>

        <div class="p-6 space-y-4">
            <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl flex items-center justify-between">
                <div>
                    <p class="text-sm font-bold text-slate-700">Tamaño de Botella</p>
                    <p class="text-xs text-slate-500" id="bottleSizeLabel">500 ml</p>
                </div>
                <button onclick="changeBottleSize()" class="text-sky-500 text-sm font-bold">✎ Cambiar</button>
            </div>

            <div class="bg-green-50 border border-green-100 p-4 rounded-2xl">
                <p class="text-sm font-bold text-green-800">Próxima en:</p>
                <p class="text-xl font-black text-green-600" id="countdown">--:--:--</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-sky-50 p-4 rounded-2xl text-center">
                    <p class="text-[10px] uppercase font-bold text-sky-400">Meta Total</p>
                    <p class="text-xl font-black text-slate-700"><span id="metaCount">6</span></p>
                </div>
                <div class="bg-orange-50 p-4 rounded-2xl text-center">
                    <p class="text-[10px] uppercase font-bold text-orange-400">⏰ Sugerida</p>
                    <p class="text-xl font-black text-slate-700" id="nextHour">--:--</p>
                </div>
            </div>

            <div class="h-3 w-full bg-sky-100 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-sky-500 progress-fill" style="width: 0%"></div>
            </div>

            <div id="bottleContainer" class="space-y-3"></div>
            
            <button onclick="resetDay()" class="w-full py-4 text-slate-400 text-xs font-bold">Reiniciar día</button>
        </div>
    </div>

    <script>
        let state = { weight: 75, bottleSize: 500, consumed: 0, meta: 0, nextReminder: null };

        function init() {
            const saved = localStorage.getItem('hydrotrack_data');
            if (saved) state = JSON.parse(saved);
            else calculateMeta();
            if (!state.nextReminder) setNextReminder();
            setInterval(updateTick, 1000);
            updateUI();
        }

        function setNextReminder() {
            state.nextReminder = new Date(new Date().getTime() + 2 * 60 * 60 * 1000);
            saveData();
        }

        function updateTick() {
            const diff = new Date(state.nextReminder) - new Date();
            const next = new Date(state.nextReminder);
            document.getElementById('nextHour').innerText = `${next.getHours().toString().padStart(2,'0')}:${next.getMinutes().toString().padStart(2,'0')}`;
            
            if (diff <= 0) document.getElementById('countdown').innerText = "¡Bebe ahora! 💧";
            else {
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdown').innerText = `01:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }

        function calculateMeta() { state.meta = Math.ceil(((state.weight / 7) * 250) / state.bottleSize); }

        function updateUI() {
            document.getElementById('metaCount').innerText = state.meta;
            document.getElementById('bottleSizeLabel').innerText = state.bottleSize + ' ml';
            document.getElementById('progressBar').style.width = (state.consumed / state.meta) * 100 + '%';
            
            const container = document.getElementById('bottleContainer');
            container.innerHTML = '';
            for (let i = 1; i <= state.meta; i++) {
                const isDone = i <= state.consumed;
                container.innerHTML += `
                    <div onclick="toggleBottle(${i})" class="bottle-card p-4 bg-white border border-slate-100 rounded-2xl flex items-center justify-between cursor-pointer ${isDone ? 'ring-2 ring-sky-400' : ''}">
                        <p class="font-bold text-slate-700">Botella #${i}</p>
                        <div class="w-6 h-6 rounded-full border-2 ${isDone ? 'bg-sky-400 border-sky-400' : 'border-slate-200'}"></div>
                    </div>`;
            }
        }

        function toggleBottle(i) { state.consumed = i; setNextReminder(); updateUI(); }
        function changeBottleSize() { state.bottleSize = parseInt(prompt("ML:", state.bottleSize)); calculateMeta(); updateUI(); }
        function resetDay() { state.consumed = 0; setNextReminder(); updateUI(); }
        function saveData() { localStorage.setItem('hydrotrack_data', JSON.stringify(state)); }

        init();
    </script>
</body>
</html>
